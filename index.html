<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Breadth Dashboard</title>
<style>
:root {
  --bg: #f5f7fb; --card: #ffffff; --header: #1f4e78;
  --text: #1f2937; --muted: #6b7280; --good: #93c47d;
  --good2: #b6d7a8; --mid: #f9cb9c; --bad: #ea9999;
  --border: #d8dee9; --shadow: 0 10px 24px rgba(15,23,42,0.08);
}
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
.wrap { max-width: 1400px; margin: 0 auto; padding: 18px; }
.topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.title h1 { margin: 0; font-size: 28px; color: var(--header); }
.title p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
select, input { border: 1px solid var(--border); background: #fff; border-radius: 10px; padding: 10px 12px; font-size: 14px; }
.quality-bar { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; background: #fff; border-radius: 14px; padding: 12px 18px; box-shadow: var(--shadow); margin-bottom: 16px; border: 1px solid rgba(31,78,120,0.08); }
.quality-bar .qitem { display: flex; align-items: center; gap: 7px; font-size: 13px; }
.quality-bar .qitem .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: #34a853; } .dot-orange { background: #f59e0b; } .dot-red { background: #ef4444; }
.quality-bar .qlabel { color: var(--muted); } .quality-bar .qval { font-weight: 700; } .quality-bar .qsep { color: #d1d5db; }
.quality-bar .qtime { margin-left: auto; color: var(--muted); font-size: 13px; }
.quality-bar .qtime strong { color: var(--header); font-size: 14px; }
.warn-badge { background: #fef3c7; color: #92400e; border-radius: 6px; font-size: 11px; padding: 2px 6px; margin-left: 6px; font-weight: 700; }
.alert-panel { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; }
.alert-panel h4 { margin: 0 0 8px; color: #92400e; font-size: 14px; }
.alert-panel ul { margin: 0; padding-left: 18px; font-size: 13px; color: #78350f; }
.alert-panel li { margin: 4px 0; }
.cards { display: grid; grid-template-columns: repeat(5, minmax(180px,1fr)); gap: 14px; margin-bottom: 18px; }
.card { background: var(--card); border-radius: 18px; padding: 16px; box-shadow: var(--shadow); border: 1px solid rgba(31,78,120,0.06); }
.card .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; color: var(--header); }
.card .sub { margin-top: 6px; color: var(--muted); font-size: 12px; }
.grid-2 { display: grid; grid-template-columns: 2.1fr 1fr; gap: 16px; margin-bottom: 18px; }
.panel { background: var(--card); border-radius: 18px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid rgba(31,78,120,0.06); }
.panel-head { background: var(--header); color: white; padding: 14px 16px; font-weight: 700; font-size: 16px; }
.table-wrap { overflow: auto; max-height: 560px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 10px 12px; text-align: center; border-bottom: 1px solid #edf2f7; white-space: nowrap; }
th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: #fff; z-index: 1; }
thead th { position: sticky; top: 0; background: #f8fafc; z-index: 2; color: #334155; }
tbody tr:hover td { background: #f8fbff; }
.metric { border-radius: 8px; font-weight: 700; }
.good { background: var(--good); } .good2 { background: var(--good2); }
.mid  { background: var(--mid);  } .bad  { background: var(--bad);  }
.list { padding: 12px; }
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #eef2f7; gap: 12px; }
.list-item:last-child { border-bottom: none; }
.sector-name { font-weight: 700; } .mini { color: var(--muted); font-size: 12px; margin-top: 4px; }
.pill { border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; display: inline-block; }
.pill.strong { background: var(--good); } .pill.moderate { background: var(--mid); }
.pill.weak, .pill.noedge { background: var(--bad); }
.detail { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; margin-bottom: 18px; }
.bars { padding: 16px; }
.bar-row { margin-bottom: 14px; }
.bar-top { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.bar-track { width: 100%; height: 12px; border-radius: 999px; background: #edf2f7; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #1f4e78, #93c47d); }
.status-box { padding: 16px; }
.status-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.status-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
.status-card h3 { margin: 0 0 10px; font-size: 15px; color: var(--header); }
.status-card ul { margin: 0; padding-left: 18px; }
.status-card li { margin: 6px 0; font-size: 14px; }
@media (max-width: 1100px) { .cards, .grid-2, .detail, .status-grid { grid-template-columns: 1fr; } }
</style>
</head>

    <div class="title">

      </div>
    </div>
    <div class="panel">

      <div class="list" id="leadersLaggards"></div>
    </div>
  </div>
  <div class="detail">
    <div class="panel">

    </div>
    <div class="panel">

</div>

function statusClass(s){ return s.toLowerCase().replace(/\s+/g,''); }
function renderQualityBar(){
  var q=qualityData||{};
  var ok=q.ok_stocks||0, mi=q.missing_count||0, nd=q.nodata_count||0, st=q.stale_count||0;
  var rt=q.run_time||'--', mb=q.most_recent_bar||'--';
  var allOk=mi===0&&nd===0&&st===0;
  var dotCls=allOk?'dot-green':(mi>0?'dot-red':'dot-orange');
  var statusTxt=allOk?'All data OK':'Data issues found';
  document.getElementById('qualityBar').innerHTML=
    '<div class="qitem"><span class="dot '+dotCls+'"></span><span class="qval">'+statusTxt+'</span></div>'+
    '<span class="qsep">|</span>'+
    '<div class="qitem"><span class="qlabel">Stocks loaded:&nbsp;</span><span class="qval">'+ok+'</span></div>'+
    '<div class="qitem"><span class="qlabel">Missing:&nbsp;</span><span class="qval" style="color:'+(mi>0?'#ef4444':'#34a853')+'">'+mi+'</span></div>'+
    '<div class="qitem"><span class="qlabel">Stale:&nbsp;</span><span class="qval" style="color:'+(st>0?'#f59e0b':'#34a853')+'">'+st+'</span></div>'+
    '<div class="qitem"><span class="qlabel">Latest bar:&nbsp;</span><span class="qval">'+mb+'</span></div>'+
    '<div class="qtime">Last updated: <strong>'+rt+'</strong></div>';
  var ap=document.getElementById('alertPanel'), alerts=[];
  if((q.missing||[]).length>0) alerts.push('<h4>Missing Stocks</h4><ul>'+q.missing.map(function(x){return'<li><strong>'+x.stock+'</strong> - '+x.sector+'</li>';}).join('')+'</ul>');
  if((q.nodata||[]).length>0)  alerts.push('<h4>No-Data Stocks</h4><ul>'+q.nodata.map(function(x){return'<li><strong>'+x.stock+'</strong> - '+x.sector+'</li>';}).join('')+'</ul>');
  if((q.stale||[]).length>0)   alerts.push('<h4>Stale Stocks (7+ days old)</h4><ul>'+q.stale.map(function(x){return'<li><strong>'+x.stock+'</strong> - '+x.sector+' - last: '+x.last_date+' ('+x.days_behind+'d behind)</li>';}).join('')+'</ul>');
  if(alerts.length>0){ap.style.display='block';ap.className='alert-panel';ap.innerHTML=alerts.join('');}else{ap.style.display='none';}
}
function renderSummary(data){
  var cards=document.getElementById('summaryCards');
  var s=data.slice().sort(function(a,b){return b.edge-a.edge;})[0];
  var w=data.slice().sort(function(a,b){return a.edge-b.edge;})[0];
  var avg=data.reduce(function(t,x){return t+x.edge;},0)/Math.max(data.length,1);
  var a50=data.filter(function(x){return x.edge>=50;}).length;
  var pw=data.filter(function(x){return x.pweek>50;}).length;
  cards.innerHTML=
    '<div class="card"><div class="label">Strongest Sector</div><div class="value" style="font-size:18px">'+(s?s.sector:'--')+'</div><div class="sub">Edge '+(s?s.edge.toFixed(2):'--')+'</div></div>'+
    '<div class="card"><div class="label">Weakest Sector</div><div class="value" style="font-size:18px">'+(w?w.sector:'--')+'</div><div class="sub">Edge '+(w?w.edge.toFixed(2):'--')+'</div></div>'+
    '<div class="card"><div class="label">Average Edge Score</div><div class="value">'+avg.toFixed(2)+'</div><div class="sub">All sectors average</div></div>'+
    '<div class="card"><div class="label">Sectors Edge &ge;50</div><div class="value">'+a50+'</div><div class="sub">Strong breadth zones</div></div>'+
    '<div class="card"><div class="label">Weekly Breadth Leaders</div><div class="value">'+pw+'</div><div class="sub">Weekly &gt; 50</div></div>';
}
function getFilteredData(){
  var q=document.getElementById('searchBox').value.trim().toLowerCase();
  var sf=document.getElementById('statusFilter').value;
  var sb=document.getElementById('sortBy').value;
  var data=dashboardData.filter(function(x){return(!q||x.sector.toLowerCase().indexOf(q)!==-1)&&(sf==='all'||x.status===sf);});
  var sm={rank:function(a,b){return a.rank-b.rank;},edge:function(a,b){return b.edge-a.edge;},rel:function(a,b){return b.relative-a.relative;},20:function(a,b){return b.p20-a.p20;},50:function(a,b){return b.p50-a.p50;},200:function(a,b){return b.p200-a.p200;}};
  data.sort(sm[sb]); return data;
}
function renderHeatmap(){
  var data=getFilteredData(), body=document.getElementById('heatmapBody');
  body.innerHTML='';
  data.forEach(function(row){
    var wb=(row.data_warning==='WARNING')?'<span class="warn-badge">data</span>':'';
    var si=(row.stocks_ok!==undefined&&row.stocks_total!==undefined)?' <span style="color:#9ca3af;font-size:11px">('+row.stocks_ok+'/'+row.stocks_total+')</span>':'';
    var tr=document.createElement('tr');
    tr.innerHTML='<td><strong>'+row.sector+'</strong>'+wb+si+'</td>'+
      '<td class="metric '+metricClass(row.p20)+'">'+row.p20.toFixed(2)+'</td>'+
      '<td class="metric '+metricClass(row.p50)+'">'+row.p50.toFixed(2)+'</td>'+
      '<td class="metric '+metricClass(row.p200)+'">'+row.p200.toFixed(2)+'</td>'+
      '<td class="metric '+metricClass(row.prsi)+'">'+row.prsi.toFixed(2)+'</td>'+
      '<td class="metric '+metricClass(row.pweek)+'">'+row.pweek.toFixed(2)+'</td>'+
      '<td class="metric '+metricClass(row.edge)+'">'+row.edge.toFixed(2)+'</td>'+
      '<td>'+row.rank+'</td><td>'+row.relative.toFixed(2)+'</td>'+
      '<td><span class="pill '+statusClass(row.status)+'">'+row.status+'</span></td>';
    tr.style.cursor='pointer';
    tr.onclick=(function(s){return function(){selectedSector=s;renderSectorDetail();};})(row.sector);
    body.appendChild(tr);
  });
}
function renderLeadersLaggards(){
  var box=document.getElementById('leadersLaggards');
  var s=dashboardData.slice().sort(function(a,b){return b.edge-a.edge;});
  var lead=s.slice(0,3), lag=s.slice().reverse().slice(0,3);
  box.innerHTML='<div style="padding:8px 4px 12px;font-weight:700;color:#1f4e78;">Top 3 Sectors</div>'+
    lead.map(function(x){return'<div class="list-item"><div><div class="sector-name">'+x.sector+'</div><div class="mini">Relative Edge '+x.relative.toFixed(2)+'</div></div><div><span class="pill '+statusClass(x.status)+'">'+x.edge.toFixed(2)+'</span></div></div>';}).join('')+
    '<div style="padding:16px 4px 12px;font-weight:700;color:#1f4e78;">Bottom 3 Sectors</div>'+
    lag.map(function(x){return'<div class="list-item"><div><div class="sector-name">'+x.sector+'</div><div class="mini">Relative Edge '+x.relative.toFixed(2)+'</div></div><div><span class="pill '+statusClass(x.status)+'">'+x.edge.toFixed(2)+'</span></div></div>';}).join('');
}
function renderSectorDetail(){
  var row=dashboardData.filter(function(x){return x.sector===selectedSector;})[0]||dashboardData[0];
  var bars=document.getElementById('sectorBars');
  if(!row){bars.innerHTML='<p style="color:#6b7280;padding:16px">No data</p>';return;}
  var m=[['20MA',row.p20],['50MA',row.p50],['200MA',row.p200],['RSI>50',row.prsi],['X%',row.pweek],['EdgeScore',row.edge]];
  var warn=(row.data_warning==='WARNING')?'<div style="background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#92400e;">Data warning: only '+row.stocks_ok+'/'+row.stocks_total+' stocks loaded</div>':'';
  bars.innerHTML='<div style="font-weight:700;color:#1f4e78;margin-bottom:14px;font-size:18px;">'+row.sector+'</div>'+warn+
    m.map(function(x){return'<div class="bar-row"><div class="bar-top"><span>'+x[0]+'</span><span>'+x[1].toFixed(2)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(0,Math.min(x[1],100))+'%"></div></div></div>';}).join('');
  var imp=dashboardData.slice().sort(function(a,b){return b.relative-a.relative;}).slice(0,4);
  var stb=dashboardData.filter(function(x){return x.edge>=50;}).slice(0,4);
  var det=dashboardData.slice().sort(function(a,b){return a.relative-b.relative;}).slice(0,4);
  document.getElementById('improvingList').innerHTML=imp.map(function(x){return'<li>'+x.sector+' ('+x.relative.toFixed(2)+')</li>';}).join('');
  document.getElementById('leadersList').innerHTML=stb.map(function(x){return'<li>'+x.sector+' ('+x.edge.toFixed(2)+')</li>';}).join('');
  document.getElementById('deterioratingList').innerHTML=det.map(function(x){return'<li>'+x.sector+' ('+x.relative.toFixed(2)+')</li>';}).join('');
}
document.getElementById('searchBox').addEventListener('input',renderHeatmap);
document.getElementById('sortBy').addEventListener('change',renderHeatmap);
document.getElementById('statusFilter').addEventListener('change',renderHeatmap);
renderQualityBar();renderSummary(dashboardData);renderHeatmap();renderLeadersLaggards();renderSectorDetail();
</script>
</body>
</html>
