name: Update Market Breadth Dashboard

on:
  schedule:
      - cron: '0 21 * * 1-5'  # Runs at 9 PM UTC (4 PM ET) Mon-Fri
        workflow_dispatch:         # Allows manual trigger

        jobs:
          build:
              runs-on: ubuntu-latest

                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v4

                                      - name: Set up Python
                                              uses: actions/setup-python@v5
                                                      with:
                                                                python-version: '3.11'

                                                                      - name: Install dependencies
                                                                              run: pip install -r requirements.txt

                                                                                    - name: Run dashboard builder
                                                                                            run: python build_dashboard.py

                                                                                                  - name: Commit and push output
                                                                                                          run: |
                                                                                                                    git config user.name "github-actions[bot]"
                                                                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                        git add data/dashboard.csv output/market_breadth_dashboard_output.html
                                                                                                                                                  git diff --cached --quiet || git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
                                                                                                                                                            git push
