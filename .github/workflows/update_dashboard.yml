name: Update Dashboard

on:
  schedule:
    - cron: '30 10 * * 1-5'
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard builder
        run: python build_dashboard.py

      - name: Copy output to index.html for GitHub Pages
        run: cp output/market_breadth_dashboard_output.html index.html

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.csv data/data_quality.json data/stocks_data.csv output/market_breadth_dashboard_output.html index.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard"
          git push
